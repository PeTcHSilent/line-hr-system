<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ประวัติ OT — ต่อกัน HR</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Prompt', 'Segoe UI', sans-serif; background: #f4f6fa; color: #1a1a2e; font-size: 14px; min-height: 100vh; }
  @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap');

  .header {
    background: linear-gradient(135deg, #F47920 0%, #e05f10 100%);
    padding: 20px 16px 40px;
    color: white;
  }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .back-btn { background: rgba(255,255,255,0.2); border: none; border-radius: 8px; padding: 6px 10px; color: white; cursor: pointer; font-size: 18px; line-height: 1; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header p { font-size: 13px; opacity: 0.85; }

  .user-card {
    margin: -24px 16px 0;
    background: white;
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar { width: 44px; height: 44px; border-radius: 50%; background: #F47920; color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px; flex-shrink: 0; overflow: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-info .name { font-weight: 600; font-size: 14px; }
  .user-info .code { font-size: 12px; color: #9ca3af; margin-top: 2px; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    padding: 16px;
  }
  .sum-card {
    background: white;
    border-radius: 10px;
    padding: 12px 8px;
    text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .sum-card .num { font-size: 20px; font-weight: 700; }
  .sum-card .lbl { font-size: 10px; color: #9ca3af; margin-top: 3px; line-height: 1.3; }
  .num-total    { color: #374151; }
  .num-approved { color: #059669; }
  .num-pending  { color: #F47920; }
  .num-hours    { color: #1357B0; }

  .filters {
    padding: 0 16px 12px;
    display: flex;
    gap: 8px;
  }
  .filter-select {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid #e8ecf0;
    border-radius: 8px;
    font-size: 13px;
    background: white;
    color: #374151;
    outline: none;
  }

  .section-title {
    padding: 0 16px 8px;
    font-size: 13px;
    font-weight: 600;
    color: #374151;
  }

  .ot-list { padding: 0 16px 24px; display: flex; flex-direction: column; gap: 10px; }

  .ot-card {
    background: white;
    border-radius: 10px;
    padding: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    border-left: 4px solid #e8ecf0;
    position: relative;
  }
  .ot-card.pending  { border-left-color: #F47920; }
  .ot-card.approved { border-left-color: #059669; }
  .ot-card.rejected { border-left-color: #ef4444; }

  .ot-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .ot-date { font-weight: 600; font-size: 14px; color: #1a1a2e; }
  .ot-submitted { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .ot-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-pending  { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
  .badge-approved { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
  .badge-rejected { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }

  .ot-detail-row { display: flex; gap: 16px; font-size: 13px; color: #374151; }
  .ot-detail-item { display: flex; align-items: center; gap: 4px; }
  .ot-detail-item span { color: #9ca3af; font-size: 12px; }
  .ot-reason { font-size: 12px; color: #6b7280; margin-top: 6px; font-style: italic; }

  .no-data {
    text-align: center;
    padding: 40px 20px;
    color: #9ca3af;
    font-size: 14px;
  }
  .no-data .icon { font-size: 40px; margin-bottom: 12px; }

  .loading { text-align: center; padding: 40px; color: #9ca3af; }
  .spinner { width: 32px; height: 32px; border: 3px solid #e8ecf0; border-top-color: #F47920; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .new-ot-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: linear-gradient(135deg, #F47920, #e05f10);
    color: white;
    border: none;
    border-radius: 50px;
    padding: 12px 20px;
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 4px 16px rgba(244,121,32,0.4);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    z-index: 10;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <button class="back-btn" onclick="history.back()">←</button>
    <div>
      <h1>📋 ประวัติ OT</h1>
      <p>คำขอโอทีที่ยื่นไปแล้ว</p>
    </div>
  </div>
</div>

<!-- User card -->
<div class="user-card">
  <div class="avatar" id="avatar">
    <img id="avatar-img" src="" alt="" style="display:none">
    <span id="avatar-initials">?</span>
  </div>
  <div class="user-info">
    <div class="name" id="user-name">กำลังโหลด...</div>
    <div class="code" id="user-code"></div>
  </div>
</div>

<!-- Summary grid -->
<div class="summary-grid">
  <div class="sum-card"><div class="num num-total" id="sum-total">—</div><div class="lbl">ทั้งหมด</div></div>
  <div class="sum-card"><div class="num num-approved" id="sum-approved">—</div><div class="lbl">อนุมัติ</div></div>
  <div class="sum-card"><div class="num num-pending" id="sum-pending">—</div><div class="lbl">รอ อนุมัติ</div></div>
  <div class="sum-card"><div class="num num-hours" id="sum-hours">—</div><div class="lbl">ชม. อนุมัติ</div></div>
</div>

<!-- Filters -->
<div class="filters">
  <select class="filter-select" id="filter-year" onchange="applyFilter()">
    <option value="">ทุกปี</option>
  </select>
  <select class="filter-select" id="filter-status" onchange="applyFilter()">
    <option value="">ทุกสถานะ</option>
    <option value="pending">รอ อนุมัติ</option>
    <option value="approved">อนุมัติแล้ว</option>
    <option value="rejected">ปฏิเสธ</option>
  </select>
</div>

<!-- List -->
<div class="section-title">รายการโอที</div>
<div class="ot-list" id="ot-list">
  <div class="loading">
    <div class="spinner"></div>
    <div>กำลังโหลด...</div>
  </div>
</div>

<!-- New OT button -->
<button class="new-ot-btn" id="new-ot-btn" style="display:none" onclick="openOTForm()">
  ➕ ขอ OT ใหม่
</button>

<script>
// TODO: สร้าง LIFF App แยกสำหรับ /liff/ot-history ใน LINE Developers Console
// แล้วใส่ ID ใน LIFF_ID_OT_HISTORY ด้านล่าง
const LIFF_ID_OT_HISTORY = ''; // ← ใส่ ID ที่ลงทะเบียน endpoint /liff/ot-history
const LIFF_ID_OT = '2010328906-qgLeVPzG';

let lineUserId = null;
let allRecords = [];

async function init() {
  try {
    const liffId = LIFF_ID_OT_HISTORY || LIFF_ID_OT;
    await liff.init({ liffId });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    lineUserId = profile.userId;

    // Avatar
    const img = document.getElementById('avatar-img');
    img.src = profile.pictureUrl || '';
    img.onload = () => { img.style.display = 'block'; document.getElementById('avatar-initials').style.display = 'none'; };
    img.onerror = () => { img.style.display = 'none'; };
  } catch(_) {
    // Dev mode — ใช้ URL param
    const params = new URLSearchParams(location.search);
    lineUserId = params.get('uid') || 'dev';
  }

  // ปีในตัวกรอง
  const curYear = new Date().getFullYear();
  const ySel = document.getElementById('filter-year');
  for (let y = curYear; y >= curYear - 2; y--) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = `พ.ศ. ${y + 543}`;
    if (y === curYear) opt.selected = true;
    ySel.appendChild(opt);
  }

  await loadData();
  document.getElementById('new-ot-btn').style.display = 'flex';
}

async function loadData() {
  const year = document.getElementById('filter-year').value || new Date().getFullYear();
  try {
    const res = await fetch(`/api/ot/mine?line_user_id=${lineUserId}&year=${year}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // User info
    const empRes = await fetch(`/api/employee/me?line_user_id=${lineUserId}`).catch(() => null);
    if (empRes && empRes.ok) {
      const emp = await empRes.json();
      document.getElementById('user-name').textContent = emp.name || '—';
      document.getElementById('user-code').textContent = `${emp.employee_code || ''} • ${emp.department_name || ''}`;
      const initials = (emp.name || '?').trim().split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
      document.getElementById('avatar-initials').textContent = initials;
    }

    allRecords = data.records || [];
    const s = data.summary || {};
    document.getElementById('sum-total').textContent    = s.total    || 0;
    document.getElementById('sum-approved').textContent = s.approved || 0;
    document.getElementById('sum-pending').textContent  = s.pending  || 0;
    document.getElementById('sum-hours').textContent    = s.total_approved_hours || 0;

    renderList(allRecords);
  } catch (err) {
    document.getElementById('ot-list').innerHTML =
      `<div class="no-data"><div class="icon">⚠️</div><div>${err.message}</div></div>`;
  }
}

function applyFilter() {
  const status = document.getElementById('filter-status').value;
  const filtered = status ? allRecords.filter(r => r.status === status) : allRecords;
  // reload data when year changes
  const prevYear = applyFilter._year;
  const curYear  = document.getElementById('filter-year').value;
  if (prevYear && prevYear !== curYear) { loadData(); return; }
  applyFilter._year = curYear;
  renderList(filtered);
}

function renderList(records) {
  const list = document.getElementById('ot-list');
  if (!records.length) {
    list.innerHTML = '<div class="no-data"><div class="icon">📋</div><div>ไม่พบรายการ OT</div></div>';
    return;
  }

  const statusLabel = { pending: 'รอ อนุมัติ', approved: 'อนุมัติแล้ว', rejected: 'ปฏิเสธ' };

  list.innerHTML = records.map(r => {
    const dateStr = r.ot_date
      ? new Date(r.ot_date).toLocaleDateString('th-TH', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' })
      : '—';
    const submittedStr = r.created_at
      ? new Date(r.created_at).toLocaleDateString('th-TH', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' })
      : '';
    const time = `${(r.start_time||'').slice(0,5)} – ${(r.end_time||'').slice(0,5)}`;
    const hours = parseFloat(r.total_hours || 0).toFixed(1);
    return `
    <div class="ot-card ${r.status}">
      <div class="ot-card-header">
        <div>
          <div class="ot-date">${dateStr}</div>
          <div class="ot-submitted">ยื่น ${submittedStr}</div>
        </div>
        <span class="ot-badge badge-${r.status}">${statusLabel[r.status] || r.status}</span>
      </div>
      <div class="ot-detail-row">
        <div class="ot-detail-item">🕐 <span>เวลา</span> ${time}</div>
        <div class="ot-detail-item">⏱ <span>รวม</span> ${hours} ชม.</div>
      </div>
      ${r.reason ? `<div class="ot-reason">📝 ${r.reason}</div>` : ''}
    </div>`;
  }).join('');
}

function openOTForm() {
  const liffOtId = `https://liff.line.me/${LIFF_ID_OT}`;
  if (liff.isInClient()) {
    liff.openWindow({ url: liffOtId, external: false });
  } else {
    window.location.href = liffOtId;
  }
}

init();
</script>
</body>
</html>
