<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>คำขอ OT — ต่อกัน HR</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Prompt', 'Sarabun', 'Helvetica Neue', sans-serif; background: #F4F6FA; color: #1a1a2e; font-size: 14px; -webkit-font-smoothing: antialiased; }

  /* Header */
  .header { background: #1357B0; padding: 16px 16px 14px; position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .header-title { color: #fff; font-size: 16px; font-weight: 600; }
  .header-sub { color: rgba(255,255,255,0.7); font-size: 12px; margin-top: 2px; }

  /* Tab */
  .tabs { display: flex; background: #fff; border-bottom: 2px solid #e8ecf0; }
  .tab { flex: 1; padding: 12px 0; text-align: center; font-size: 13px; font-weight: 500; color: #9ca3af; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s; }
  .tab.active { color: #1357B0; border-bottom-color: #1357B0; font-weight: 600; }

  /* Form */
  .page { display: none; }
  .page.active { display: block; }
  .form-body { padding: 14px; display: flex; flex-direction: column; gap: 14px; }

  .card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .card-title { font-size: 11px; font-weight: 700; color: #6B7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 13px; color: #374151; font-weight: 600; }
  .field input, .field select, .field textarea {
    border: 1.5px solid #E5E7EB; border-radius: 8px; padding: 10px 12px;
    font-size: 14px; font-family: inherit; color: #111827; outline: none;
    transition: border-color 0.15s; width: 100%; background: #fff;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: #1357B0; }
  .field textarea { resize: none; min-height: 72px; }
  .req { color: #ef4444; }

  .time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .time-row .field input[type="time"] {
    padding: 12px 10px; font-size: 16px; text-align: center;
    min-height: 48px; font-weight: 600; color: #111827;
    letter-spacing: 0.5px;
  }
  .time-row .field label { font-size: 12px; color: #6b7280; font-weight: 600; text-align: center; }

  /* Hours preview */
  .hours-preview {
    background: #EFF6FF; border: 1.5px solid #BFDBFE; border-radius: 10px;
    padding: 12px 16px; text-align: center; display: none;
  }
  .hours-preview.show { display: block; }
  .hours-preview .hours-num { font-size: 28px; font-weight: 700; color: #1357B0; line-height: 1; }
  .hours-preview .hours-lbl { font-size: 12px; color: #6b7280; margin-top: 4px; }

  /* Submit button */
  .submit-btn {
    width: 100%; padding: 14px; background: #F47920; color: #fff;
    border: none; border-radius: 12px; font-size: 15px; font-weight: 600;
    font-family: inherit; cursor: pointer; transition: opacity 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .submit-btn:active { opacity: 0.85; }
  .submit-btn:disabled { background: #d1d5db; cursor: not-allowed; }

  /* History */
  .history-body { padding: 14px; display: flex; flex-direction: column; gap: 10px; }

  /* Summary bar */
  .sum-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 4px; }
  .sum-card { background: #fff; border-radius: 10px; padding: 10px 12px; text-align: center; border: 1px solid #e8ecf0; }
  .sum-card .num { font-size: 22px; font-weight: 700; line-height: 1.2; }
  .sum-card .lbl { font-size: 11px; color: #9ca3af; margin-top: 2px; }
  .num-pending  { color: #F47920; }
  .num-approved { color: #22c55e; }
  .num-hours    { color: #1357B0; }

  /* OT item card */
  .ot-item { background: #fff; border-radius: 12px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .ot-item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .ot-date { font-weight: 600; font-size: 14px; color: #111827; }
  .ot-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .ot-pending  { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
  .ot-approved { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
  .ot-rejected { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
  .ot-item-detail { display: flex; gap: 16px; font-size: 12px; color: #6b7280; margin-bottom: 6px; }
  .ot-item-detail span { display: flex; align-items: center; gap: 4px; }
  .ot-reason { font-size: 12px; color: #374151; background: #f8fafc; border-radius: 6px; padding: 6px 10px; border-left: 3px solid #e8ecf0; }

  /* Loading / empty */
  .loading { text-align: center; padding: 40px; color: #9ca3af; font-size: 13px; }
  .empty-state { text-align: center; padding: 40px 20px; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; color: #9ca3af; }

  /* Toast */
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: #1a1a2e; color: #fff; padding: 12px 20px; border-radius: 10px;
    font-size: 13px; opacity: 0; transition: opacity 0.3s; z-index: 999;
    pointer-events: none; white-space: nowrap; }
  #toast.show { opacity: 1; }
  #toast.success { background: #059669; }
  #toast.error   { background: #dc2626; }

  /* Loading overlay */
  #overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.7); z-index: 900; align-items: center; justify-content: center; }
  #overlay.show { display: flex; }
  .spinner { width: 36px; height: 36px; border: 3px solid #e8ecf0; border-top-color: #1357B0; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ot-type-label { display:flex; align-items:center; gap:8px; padding:10px 14px; border-radius:10px; font-size:13px; font-weight:600; margin-top:6px; }
  .ot-type-label.weekday { background:#eff4ff; color:#1357B0; border:1px solid #bfdbfe; }
  .ot-type-label.holiday { background:#fff7ed; color:#F47920; border:1px solid #fed7aa; }


</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">⏱ คำขอทำงานล่วงเวลา (OT)</div>
      <div class="header-sub" id="emp-name-display">กำลังโหลด...</div>
    </div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('form')">📝 ยื่นคำขอ OT</div>
  <div class="tab" onclick="switchTab('history')">📋 ประวัติ OT</div>
</div>

<!-- ===== TAB: FORM ===== -->
<div class="page active" id="tab-form">
  <div class="form-body">
    <!-- วันที่ -->
    <div class="card">
      <div class="card-title">วันที่ทำ OT</div>
      <div class="field">
        <label>เลือกวันที่ <span class="req">*</span></label>
        <input type="date" id="ot-date" onchange="checkOTType(this.value)" oninput="calcHours()">
      </div>
      <div id="ot-type-label" class="ot-type-label" style="display:none;"></div>
    </div>

    <!-- เวลา -->
    <div class="card">
      <div class="card-title">ช่วงเวลา OT</div>
      <div class="time-row">
        <div class="field">
          <label>🕐 เวลาเริ่ม <span class="req">*</span></label>
          <input type="time" id="ot-start" oninput="calcHours()" placeholder="--:--">
        </div>
        <div class="field">
          <label>🕕 เวลาสิ้นสุด <span class="req">*</span></label>
          <input type="time" id="ot-end" oninput="calcHours()" placeholder="--:--">
        </div>
      </div>
      <div style="margin-top:12px;">
        <div class="hours-preview" id="hours-preview">
          <div class="hours-num" id="hours-num">0</div>
          <div class="hours-lbl">ชั่วโมง OT</div>
        </div>
      </div>
    </div>

    <!-- เหตุผล -->
    <div class="card">
      <div class="card-title">เหตุผล</div>
      <div class="field">
        <label>ระบุเหตุผล <span class="req">*</span></label>
        <textarea id="ot-reason" placeholder="เช่น ปิดงานโปรเจกต์ลูกค้า XYZ, เตรียมเอกสารส่ง..."></textarea>
      </div>
    </div>

    <!-- Submit -->
    <button class="submit-btn" id="submit-btn" onclick="submitOT()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      ส่งคำขอ OT
    </button>

  </div>
</div>

<!-- ===== TAB: HISTORY ===== -->
<div class="page" id="tab-history">
  <div class="history-body">
    <!-- Summary -->
    <div class="sum-row">
      <div class="sum-card"><div class="num num-pending"  id="h-pending">—</div><div class="lbl">รอ อนุมัติ</div></div>
      <div class="sum-card"><div class="num num-approved" id="h-approved">—</div><div class="lbl">อนุมัติแล้ว</div></div>
      <div class="sum-card"><div class="num num-hours"    id="h-hours">—</div><div class="lbl">รวม OT ชม.</div></div>
    </div>
    <!-- List -->
    <div id="history-list">
      <div class="loading">กำลังโหลด...</div>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="overlay"><div class="spinner"></div></div>

<script>
const LIFF_ID = '2010328906-qgLeVPzG'; // OT LIFF app (endpoint: /liff/ot)
let lineUserId = null;
let employeeId = null;

// ---- Init ----
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    lineUserId = profile.userId;

    // ดึงข้อมูลพนักงาน
    const res = await fetch(`/api/employee/me?line_user_id=${lineUserId}`);
    if (!res.ok) throw new Error('ไม่พบข้อมูลพนักงาน');
    const emp = await res.json();
    employeeId = emp.id;
    document.getElementById('emp-name-display').textContent = `${emp.name} (${emp.employee_code})`;

    // Set default date = today
    document.getElementById('ot-date').value = new Date().toISOString().slice(0, 10);
  } catch (err) {
    document.getElementById('emp-name-display').textContent = err.message;
    toast(err.message, 'error');
  }
}

// ---- Tab switch ----
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === (name === 'form' ? 0 : 1)));
  document.getElementById('tab-form').classList.toggle('active', name === 'form');
  document.getElementById('tab-history').classList.toggle('active', name === 'history');
  if (name === 'history') loadHistory();
}

// ---- Calculate hours ----
function calcHours() {
  const start = document.getElementById('ot-start').value;
  const end   = document.getElementById('ot-end').value;
  const preview = document.getElementById('hours-preview');
  if (!start || !end) { preview.classList.remove('show'); return; }

  const [sh, sm] = start.split(':').map(Number);
  const [eh, em] = end.split(':').map(Number);
  let mins = (eh * 60 + em) - (sh * 60 + sm);
  if (mins <= 0) mins += 24 * 60; // ข้ามเที่ยงคืน
  const hours = (mins / 60).toFixed(1);
  document.getElementById('hours-num').textContent = hours;
  preview.classList.add('show');
}



async function checkOTType(dateStr) {
  const label = document.getElementById('ot-type-label');
  if (!dateStr) { label.style.display = 'none'; return; }
  try {
    const res = await fetch('/api/settings/check-ot-type?date=' + dateStr);
    const data = await res.json();
    if (data.ot_type === 'holiday') {
      label.className = 'ot-type-label holiday';
      label.innerHTML = '🎌 วันหยุด — อัตรา OT × 3.0';
    } else {
      label.className = 'ot-type-label weekday';
      label.innerHTML = '📅 วันทำงานปกติ — อัตรา OT × 1.5';
    }
    label.style.display = 'flex';
  } catch (e) { label.style.display = 'none'; }
}

// ---- Submit OT ----
async function submitOT() {
  const date   = document.getElementById('ot-date').value;
  const start  = document.getElementById('ot-start').value;
  const end    = document.getElementById('ot-end').value;
  const reason = document.getElementById('ot-reason').value.trim();

  if (!date)   return toast('กรุณาเลือกวันที่', 'error');
  if (!start)  return toast('กรุณาระบุเวลาเริ่ม', 'error');
  if (!end)    return toast('กรุณาระบุเวลาสิ้นสุด', 'error');
  if (!reason) return toast('กรุณาระบุเหตุผล', 'error');
  if (!employeeId) return toast('ไม่พบข้อมูลพนักงาน', 'error');

  showOverlay(true);
  try {
    const res = await fetch('/api/ot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        employee_id: employeeId,
        ot_date:     date,
        start_time:  start,
        end_time:    end,
        reason,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'เกิดข้อผิดพลาด');

    toast(data.message || 'ส่งคำขอ OT สำเร็จ ✓', 'success');

    // Reset form
    document.getElementById('ot-date').value   = new Date().toISOString().slice(0, 10);
    document.getElementById('ot-start').value  = '';
    document.getElementById('ot-end').value    = '';
    document.getElementById('ot-reason').value = '';
    document.getElementById('hours-preview').classList.remove('show');

    // Switch to history after 1.5s
    setTimeout(() => switchTab('history'), 1500);
  } catch (err) {
    toast(err.message, 'error');
  } finally {
    showOverlay(false);
  }
}

// ---- Load history ----
async function loadHistory() {
  const list = document.getElementById('history-list');
  list.innerHTML = '<div class="loading">กำลังโหลด...</div>';
  if (!employeeId) {
    list.innerHTML = '<div class="loading">กรุณารอสักครู่...</div>';
    return;
  }

  try {
    const cy = new Date().getFullYear();
    const res = await fetch(`/api/ot?employee_id=${employeeId}&year=${cy}`);
    const data = await res.json();
    const records = Array.isArray(data) ? data : [];

    // Summary
    const pending  = records.filter(r => r.status === 'pending').length;
    const approved = records.filter(r => r.status === 'approved').length;
    const hours    = records
      .filter(r => r.status === 'approved')
      .reduce((s, r) => s + parseFloat(r.total_hours || 0), 0);
    document.getElementById('h-pending').textContent  = pending;
    document.getElementById('h-approved').textContent = approved;
    document.getElementById('h-hours').textContent    = hours.toFixed(1);

    if (!records.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⏱</div>
          <div class="empty-text">ยังไม่มีประวัติ OT ในปีนี้</div>
        </div>`;
      return;
    }

    const statusMap = { pending:'รอ อนุมัติ', approved:'อนุมัติแล้ว', rejected:'ไม่อนุมัติ' };
    const fmtDate = s => s ? new Date(s).toLocaleDateString('th-TH', { weekday:'short', day:'numeric', month:'short', year:'numeric' }) : '—';

    list.innerHTML = records.map(r => `
      <div class="ot-item">
        <div class="ot-item-top">
          <div class="ot-date">${fmtDate(r.ot_date)}</div>
          <span class="ot-badge ot-${r.status}">${statusMap[r.status] || r.status}</span>
        </div>
        <div class="ot-item-detail">
          <span>🕐 ${(r.start_time||'').slice(0,5)} – ${(r.end_time||'').slice(0,5)}</span>
          <span>⏱ <strong>${parseFloat(r.total_hours||0).toFixed(1)} ชม.</strong></span>
        </div>
        ${r.reason ? `<div class="ot-reason">${r.reason}</div>` : ''}
      </div>
    `).join('');
  } catch (err) {
    list.innerHTML = `<div class="loading" style="color:#ef4444;">${err.message}</div>`;
  }
}

// ---- Helpers ----
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + type;
  setTimeout(() => el.className = '', 2800);
}

function showOverlay(show) {
  document.getElementById('overlay').classList.toggle('show', show);
  document.getElementById('submit-btn').disabled = show;
}

init();
</script>
</body>
</html>
