<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เข้าสู่ระบบ — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1357B0 0%, #0d3f82 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%; max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .logo {
      text-align: center; margin-bottom: 28px;
    }
    .logo-icon {
      width: 56px; height: 56px;
      background: #1357B0; border-radius: 14px;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 28px; margin-bottom: 12px;
    }
    .logo h1 { font-size: 20px; color: #1357B0; font-weight: 700; }
    .logo p  { font-size: 13px; color: #888; margin-top: 2px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 6px; }
    input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 14px; transition: border-color .2s;
      outline: none;
    }
    input:focus { border-color: #1357B0; }
    .btn-login {
      width: 100%; padding: 13px;
      background: #1357B0; color: #fff;
      border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: background .2s; margin-top: 4px;
    }
    .btn-login:hover { background: #0d3f82; }
    .btn-login:disabled { background: #aaa; cursor: not-allowed; }
    .error {
      background: #fff0f0; color: #c0392b;
      border: 1px solid #f5c6cb; border-radius: 8px;
      padding: 10px 14px; font-size: 13px;
      margin-bottom: 16px; display: none;
    }
    .version { text-align: center; font-size: 11px; color: #bbb; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <div class="logo-icon">👔</div>
      <h1>ต่อกัน HR</h1>
      <p>ระบบจัดการ HR สำหรับผู้ดูแล</p>
    </div>

    <div class="error" id="errorMsg"></div>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="กรอก username" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="กรอก password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn-login" id="btnLogin">เข้าสู่ระบบ</button>
    </form>

    <div class="version">v1.0 · Line HR System</div>
  </div>

  <script>
    // ถ้ามี token อยู่แล้วและยังใช้ได้ → redirect ไป dashboard
    (async () => {
      const token = localStorage.getItem('adminToken');
      if (!token) return;
      try {
        const res = await fetch('/api/auth/verify', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) window.location.href = '/admin';
      } catch {}
    })();

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('errorMsg');
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      btn.disabled = true;
      btn.textContent = 'กำลังเข้าสู่ระบบ…';
      err.style.display = 'none';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'เข้าสู่ระบบไม่สำเร็จ');

        localStorage.setItem('adminToken', data.token);
        window.location.href = '/admin';
      } catch (ex) {
        err.textContent  = ex.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'เข้าสู่ระบบ';
      }
    });
  </script>
</body>
</html>
